<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <title> Petinhos - tudo para o seu pet</title>
</head>

<body style="margin: 0;">
    <header
        style="background-color: #59B09D; font-family: 'Trebuchet MS', sans-serif; display: flex;gap: 64px;height: 70px;align-items: center;">
        <img src="image/logo.png" alt="Logo Petinhos" width="80" height="80" />
        <nav style="display: flex;gap: 64px;">
            <a>Início</a>
            <a href="/servicos.html">Serviços</a>
            <a href="#faleconosco">Fale conosco</a>
        </nav>
    </header>

    <div style="width: 100%; max-height: 600px;">
        <video width="100%" height="auto" autoplay loop style="max-height: 600px; object-fit: cover;">
            <source src="/petshop/video/video_web.mp4" type="video/mp4">
            Seu navegador não suporta este formato de vídeo.
        </video>
    </div>

    <!-- Se essa section só tem um item, pq tem um gap? -->
    <section
        style="font-family: 'Trebuchet MS', sans-serif; background-color: #59B09D; display: flex;gap: 64px;height: 70px;justify-content: center;">
        <h2>Serviços</h2>
    </section>

    <div style="width: 100%;max-height: 500px;">
        <img width="100%" height="auto" src="image/banner_serviços.png" alt="Banner Serviços"
            style="max-height: 500px; object-fit: cover;" />
    </div>

    <section id="faleconosco"  style="display: flex;justify-content:space-between;padding: 0 200px;gap: 64px;">
    <div>
        <h2 style="font-family: 'Trebuchet MS', sans-serif;">Fale Conosco</h2>
        <p style="font-family: 'Trebuchet MS', sans-serif"> Entre em contato conosco para mais
            informações sobre produtos e serviços.</p>
    </div>
     <div style="display: flex;gap: 20px; flex-direction: column;">
        <h2 style="font-family: 'Trebuchet MS', sans-serif; display: flex;justify-content: center;">Preencha o
            formulário</h2>
        <form style="display: flex;justify-content: center;">
            <fieldset style="width: 30%; margin: auto; display: flex; flex-direction: column; gap: 16px;">
                <label for="fname" style="font-family: 'Trebuchet MS', sans-serif;">Nome:</label>
                <input type=”text” required name="nome" placeholder="Digite seu nome">
                <label for="email" style="font-family: 'Trebuchet MS', sans-serif;">Email:</label>
                <input type=”email” placeholder="Digite seu email">
                <label for="adress" style="font-family: 'Trebuchet MS', sans-serif;">Endereço</label>
                <input type=”text” placeholder="Digite seu endereço">
                <label for="phone" style="font-family: 'Trebuchet MS', sans-serif;">Telefone</label>
                <input type=”text” required name="tel" placeholder="(xx) xxxxx-xxxx">
                <label for="assunto" style="font-family: 'Trebuchet MS', sans-serif;">Assunto:</label>
                <select id="assunto" name="assunto">
                    <option value="posvendas">Pós vendas</option>
                    <option value="servicos">Serviços Pet</option>
                    <option value="parcerias">Parcerias</option>
                    <option value="sugestao">Sugestões</option>
                    <option value="reclamacao">Reclamações</option>
                    <option value="outros">Outros</option>
                </select>
                <textarea name="mensagem" placeholder="Digite sua mensagem" rows="4" cols="50"></textarea>
                <input type="submit" value="Enviar">
            </fieldset>
        </form>
     </div>
    </section>
</body>


</html>
